services:
  redis:
    container_name: redis
    image: redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
    command: redis-server --save 60 1 --loglevel warning

  backend:
    build: .
    container_name: backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./:/app/
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY='5c17613ec69a50f03188462628fe14b181b2d41021de2543b07d1506e1321a72'
      - DEBUG=True
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on: 
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: celery_worker
    command: celery -A core worker --loglevel=info
    volumes:
      - ./:/app/
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on: 
      - redis
      - backend

  smtp4dev:
    image: rnwood/smtp4dev:v3
    restart: always
    ports:
      # Change the number before : to the port the web interface should be accessible on
      - '5000:80'
      # Change the number before : to the port the SMTP server should be accessible on
      - '25:25'
      # Change the number before : to the port the IMAP server should be accessible on
      - '143:143'
      # Change the number before : to the port the POP3 server should be accessible on
      - '110:110'
    volumes:
        - smtp4dev-data:/smtp4dev
    environment:
      - ServerOptions__Urls=http://*:80

      - ServerOptions__HostName=smtp4dev
  
  master:
    image: locustio/locust
    ports:
     - "8089:8089"
    volumes:
      - ./locust:/locust
    command: -f /locust/locustfile.py --master -H http://backend:8000/
  
  worker:
    image: locustio/locust
    volumes:
      - ./locust:/locust
    command: -f /locust/locustfile.py --worker --master-host master

volumes:
  smtp4dev-data:

