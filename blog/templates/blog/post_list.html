<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weblog posts</title>
</head>
<body>
    <h1 align="center">Weblog Posts</h1>
    {% for post in posts %}
        <div>
            <a href="{% url 'blog:post-detail' pk=post.id %}"><h1 align="center">{{post.title}}</h1></a>
            <p align="center">{{post.content}}</p>
            <div align="center">
                <a href="{% url 'blog:post-delete' pk=post.id %}">delete</a>
                <a href="{% url 'blog:edit-post' pk=post.id %}">edit</a>
            </div>
        </div>
    {% endfor %}

    <div class="pagination">
        <span class="step-links">
            {% if page_obj.has_previous %}
                <a href="?page=1">&laquo; first</a>
                <a href="?page={{ page_obj.previous_page_number }}">previous</a>
            {% endif %}

            <span class="current">
                Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}.
            </span>

            {% if page_obj.has_next %}
                <a href="?page={{ page_obj.next_page_number }}">next</a>
                <a href="?page={{ page_obj.paginator.num_pages }}">last &raquo;</a>
            {% endif %}
        </span>
    </div>
</body>
</html>
